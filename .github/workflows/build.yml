name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  ios-libmpv:
    # Apple Silicon runner: matches the arm64 host most closely to our
    # target architectures and has recent Xcode preinstalled.
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v6

      - name: Select latest available Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $LATEST"
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcodebuild -version

      - name: Install build tools
        run: |
          brew install meson ninja pkg-config gnu-sed nasm autoconf automake libtool coreutils

      - name: Export cache key
        run: ./include/ci.sh export >>"$GITHUB_ENV"
        working-directory: buildscripts

      - uses: actions/cache@v5
        with:
          path: buildscripts/gh-cache/
          key: "${{ env.CACHE_IDENTIFIER }}"

      - name: Download / build dependency prefixes (cached per platform slice)
        working-directory: buildscripts
        env:
          CACHE_MODE: folder
          CACHE_FOLDER: ${{ github.workspace }}/buildscripts/gh-cache
          # Pins the five git-cloned deps (mpv, ffmpeg, dav1d, libass,
          # libplacebo) to the versions in depinfo.sh's v_ci_* variables,
          # instead of always cloning latest HEAD — see download.sh and
          # depinfo.sh for why (reproducible CI vs. an unrelated upstream
          # commit silently breaking an unrelated push).
          IN_CI: 1
        run: |
          mkdir -p "$CACHE_FOLDER"
          ./include/ci.sh install

      - name: Build libmpv + assemble XCFramework
        working-directory: buildscripts
        run: ./include/ci.sh build

      - name: Verify XCFramework structure
        run: |
          test -d Libmpv.xcframework
          find Libmpv.xcframework -maxdepth 2

      - name: Stage MPVKit package with binary framework
        run: |
          mkdir -p MPVKit/Frameworks
          cp -R Libmpv.xcframework MPVKit/Frameworks/

      - uses: actions/upload-artifact@v4
        with:
          name: Libmpv-xcframework
          path: Libmpv.xcframework
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: MPVKit-package
          path: MPVKit
          if-no-files-found: error

  swift-package-build:
    needs: ios-libmpv
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Select latest available Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $LATEST"
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcodebuild -version

      - uses: actions/download-artifact@v4
        with:
          name: MPVKit-package
          path: MPVKit

      # IMPORTANT: this job intentionally uses `xcodebuild`, not
      # `swift build`. Plain `swift build -Xswiftc -sdk ... -Xswiftc -target
      # ...` cannot build a Swift package that has a .binaryTarget
      # (our XCFramework-wrapping "Libmpv" target) for iOS or the iOS
      # Simulator at all - this is a known, documented upstream SwiftPM
      # limitation (swift-package-manager#6571), not a mistake in how the
      # flags were passed here. SwiftPM's own binary-target resolution code
      # (SPMBuildCore/BinaryTarget+Extensions.swift, at the time that issue
      # was filed) only maps the "macos" platform string to an XCFramework
      # slice - there is no ios/ios-simulator case in that mapping at all,
      # so `swift build` looks for a macOS slice in our XCFramework
      # regardless of the -sdk/-target overrides passed to the Swift
      # compiler frontend, producing the "using sysroot for 'MacOSX' but
      # targeting 'iPhone'" warning and a cascading "file not found" error
      # for every header the misdirected sysroot can't actually locate.
      # `xcodebuild`, by contrast, has always correctly understood
      # XCFrameworks across platforms (it's also how mpv-ios-player itself
      # gets built - see project.yml + appetize-preview.yml), so it's used
      # here too instead of the SwiftPM CLI. See docs/RESEARCH.md for the
      # full incident.
      - name: Build MPVKit for iOS Simulator
        run: |
          cd MPVKit
          xcodebuild build \
            -scheme MPVKit \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO

      - name: Build MPVKit for iOS device
        run: |
          cd MPVKit
          xcodebuild build \
            -scheme MPVKit \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO
