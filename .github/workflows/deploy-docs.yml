name: deploy-docs

# Builds the Docusaurus site in documentation-site/ and deploys it to
# GitHub Pages, free of charge, on every push that touches the docs
# source. This is entirely separate from the mpv build pipeline
# (build.yml/release.yml) - it never needs a Mac runner, since Docusaurus
# itself is just a Node.js static site generator.

on:
  push:
    branches: [main, master]
    paths:
      - 'documentation-site/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: documentation-site
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          # NOTE: npm dependency caching (cache: npm) is intentionally
          # NOT enabled here. actions/setup-node's cache feature requires
          # a package-lock.json to key the cache against, and this
          # project does not commit one yet (see documentation-site's own
          # README for why, and how to generate one). Pointing
          # cache-dependency-path at a lockfile that doesn't exist
          # produces "Some specified paths were not resolved, unable to
          # cache dependencies" - a harmless warning on its own, but it's
          # a sign the real fix (committing an actual package-lock.json)
          # hasn't been done yet, not something to silence by pointing
          # this at a different file. Once a real package-lock.json is
          # committed, add `cache: npm` back here and switch `npm install`
          # below back to `npm ci` (faster, and enforces the lockfile
          # matches package.json exactly - npm ci refuses to run at all
          # without a lockfile present, which is why it isn't used yet
          # either).

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: documentation-site/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
