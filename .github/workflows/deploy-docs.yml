name: deploy-docs

# Builds the Docusaurus site in documentation-site/ and deploys it to
# GitHub Pages, free of charge, on every push that touches the docs
# source. This is entirely separate from the mpv build pipeline
# (build.yml/release.yml) - it never needs a Mac runner, since Docusaurus
# itself is just a Node.js static site generator.

on:
  push:
    branches: [main, master]
    paths:
      - 'documentation-site/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: documentation-site
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: documentation-site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: documentation-site/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
